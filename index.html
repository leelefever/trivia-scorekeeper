<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Trivia Score" />
<title>Trivia Scorekeeper</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #e8ecf0;
    --white: #ffffff;
    --border: #cdd5dd;
    --border2: #b8c5cf;
    --text: #162030;
    --text2: #4a5a6a;
    --text3: #8a9aaa;
    --accent: #1e4d7b;
    --accent-light: #e8f0f8;
    --accent-text: #163a5f;
    --gold: #c07820;
    --gold-light: #fdf0d5;
    --green: #1f8f5a;
    --green-light: #d8f2e6;
    --red: #b03030;
    --red-light: #faeaea;
    --silver: #6e9ab5;
    --bronze: #7a5c2a;
    --radius: 14px;
    --radius-sm: 10px;
    --shadow: 0 1px 3px rgba(22,32,48,0.07), 0 1px 2px rgba(22,32,48,0.05);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { background: #cdd5de; min-height: 100vh; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; max-width: 480px; margin: 0 auto; min-height: 100vh; border-left: 1px solid var(--border); border-right: 1px solid var(--border); box-shadow: 0 0 0 1px var(--border), 0 4px 32px rgba(22,32,48,0.10); }

  /* Header */
  .header { background: var(--white); padding: 1rem 1.25rem 0.875rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 18px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
  .header .game-status { font-size: 12px; color: var(--text3); margin-top: 3px; display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
  .status-dot.active { background: var(--green); }

  /* Nav */
  .nav { background: var(--white); display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid var(--border); }
  .nav-btn { padding: 0.7rem 0; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; background: none; border: none; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; letter-spacing: 0; }
  .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); border-bottom-width: 3px; }

  /* Screens */
  .screen { display: none; padding: 1.25rem; padding-bottom: 6rem; }
  .screen.active { display: block; }

  /* Typography */
  h2 { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 1.25rem; color: var(--text); }
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #7a8fa0; margin-bottom: 0.625rem; }

  /* Inputs */
  input[type="text"], input[type="number"] {
    background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); font-size: 16px; padding: 12px 14px; width: 100%;
    font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.15s;
    box-shadow: var(--shadow);
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(42,84,120,0.12); }
  input[type="number"] { text-align: center; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 500; }
  input::placeholder { color: var(--text3); }

  /* Buttons */
  .btn { cursor: pointer; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--white); color: var(--text); font-size: 15px; font-weight: 500; padding: 11px 18px; font-family: 'DM Sans', sans-serif; transition: all 0.15s; box-shadow: var(--shadow); }
  .btn:active { transform: scale(0.98); opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 10px rgba(30,77,123,0.30); }
  .btn-primary:active { background: var(--accent-text); }
  .btn-sm { padding: 8px 14px; font-size: 14px; }
  .btn-ghost { background: none; border-color: transparent; color: var(--text2); box-shadow: none; }
  .btn-danger { border-color: var(--red); color: var(--red); background: var(--red-light); box-shadow: none; }
  .btn-icon { width: 40px; height: 40px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; border-radius: var(--radius-sm); }

  /* Cards */
  .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.125rem; margin-bottom: 10px; box-shadow: var(--shadow); }

  /* Team list */
  .team-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .team-pill { flex: 1; font-size: 15px; font-weight: 500; padding: 12px 14px; background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); box-shadow: var(--shadow); }

  /* Score entry */
  .score-card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow); }
  .score-card .team-name { flex: 1; font-size: 16px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .score-card input { width: 76px; flex-shrink: 0; }

  /* Leaderboard */
  .lb-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); margin-bottom: 1.25rem; }
  .lb-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .lb-item:last-child { border-bottom: none; }
  .lb-item.rank-first { background: var(--accent-light); }
  .rank-badge { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; font-family: 'DM Mono', monospace; }
  .rb-1 { background: var(--accent); color: #fff; }
  .rb-2 { background: transparent; color: var(--accent); border: 2px solid var(--accent); }
  .rb-3 { background: transparent; color: var(--accent-text); border: 1.5px solid var(--border2); }
  .rb-n { background: transparent; color: var(--text3); border: 1px solid var(--border); }
  .lb-name { flex: 1; font-size: 16px; font-weight: 500; }
  .lb-pts { font-size: 24px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--accent); }
  .tie-tag { font-size: 10px; font-weight: 600; color: #ffffff; background: var(--accent); border-radius: 6px; padding: 2px 7px; margin-left: 8px; letter-spacing: 0.04em; }

  /* Round table */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { padding: 10px 12px; text-align: center; color: var(--text3); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); white-space: nowrap; background: var(--bg); }
  th:first-child { text-align: left; }
  td { padding: 12px; text-align: center; border-bottom: 1px solid var(--border); color: var(--text2); font-family: 'DM Mono', monospace; font-size: 14px; }
  td:first-child { text-align: left; font-family: 'DM Sans', sans-serif; font-weight: 500; color: var(--text); white-space: nowrap; }
  td.total-col { color: var(--accent); font-weight: 600; }
  tr:last-child td { border-bottom: none; }

  /* Log */
  .log-round { margin-bottom: 1rem; }
  .log-entry { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .log-entry:last-child { border-bottom: none; }
  .log-pts { font-family: 'DM Mono', monospace; font-weight: 500; color: var(--accent); }

  /* Misc */
  .warn { color: var(--red); font-size: 13px; margin-top: 8px; font-weight: 500; }
  .muted { color: var(--text2); font-size: 14px; line-height: 1.5; }
  .row { display: flex; gap: 10px; align-items: center; }
  .spacer { flex: 1; }
  .mt { margin-top: 1rem; }
  .mb { margin-bottom: 1rem; }
  .saved-flash { color: var(--green); font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.3s; }
  .saved-flash.show { opacity: 1; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }
  .sheets-status { font-size: 13px; font-weight: 500; margin-top: 8px; }
  .sheets-status.on { color: var(--green); }
  .sheets-status.off { color: var(--text3); }
  .hint { font-size: 13px; color: var(--text2); margin-bottom: 10px; line-height: 1.5; }

  /* Progress bar */
  .progress-bar-wrap { background: var(--border); border-radius: 99px; height: 6px; margin-bottom: 1.25rem; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent), #3a7ab8); transition: width 0.4s ease; }

  /* End game modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(22,32,48,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1.25rem; }
  .modal { background: var(--white); border-radius: var(--radius); padding: 1.5rem 1.25rem 1.5rem; width: 100%; max-width: 440px; box-shadow: 0 8px 40px rgba(22,32,48,0.18); max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
  .modal-sub { font-size: 14px; color: var(--text2); margin-bottom: 1.5rem; line-height: 1.5; }
  .winner-row { display: flex; align-items: center; gap: 12px; background: var(--gold-light); border: 1px solid #e8d8a8; border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
  .winner-star { font-size: 22px; color: var(--gold); }
  .winner-name { font-size: 18px; font-weight: 600; flex: 1; }
  .winner-pts { font-size: 22px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--gold); }

  /* Home screen */
  .home-state { padding: 2rem 0 1rem; }
  .home-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); margin-bottom: 1.5rem; }
  .home-action { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.25rem; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; cursor: pointer; box-shadow: var(--shadow); transition: border-color 0.15s; }
  .home-action:active { opacity: 0.8; }
  .home-action.primary { border-color: var(--accent); background: #e0ecf8; }
  .home-action-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--accent-light); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; color: var(--accent); font-weight: 600; }
  .home-action.primary .home-action-icon { background: var(--accent); color: #fff; }
  .home-action-text { flex: 1; }
  .home-action-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .home-action-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .home-action-arrow { color: var(--text3); font-size: 16px; }
  .home-stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .home-stat { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; box-shadow: var(--shadow); }
  .home-stat-val { font-size: 28px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--accent); }
  .home-stat-label { font-size: 12px; color: var(--text3); margin-top: 3px; font-weight: 500; }
  .home-leader { background: var(--gold-light); border: 1px solid #e8d8a8; border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow); }
  .home-leader-crown { font-size: 20px; }
  .home-leader-name { font-size: 16px; font-weight: 600; color: var(--text); flex: 1; }
  .home-leader-pts { font-size: 22px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--gold); }
  .home-action.end-game { border-color: var(--green); background: var(--green-light); }
  .home-action.end-game .home-action-icon { background: var(--green); color: #fff; }
  .home-action.end-game .home-action-title { color: var(--green); }
  .home-action.end-game .home-action-arrow { color: var(--green); }
  .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; box-shadow: var(--shadow); }
  .stat-val { font-size: 24px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--accent); }
  .stat-label { font-size: 12px; color: var(--text3); margin-top: 3px; font-weight: 500; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(22,32,48,0.55); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1.25rem; }
  .modal { background: var(--white); border-radius: var(--radius); padding: 1.5rem 1.25rem; width: 100%; max-width: 440px; box-shadow: 0 8px 40px rgba(22,32,48,0.18); max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 0.375rem; }
  .modal-sub { font-size: 14px; color: var(--text2); margin-bottom: 1.25rem; }
  .winner-row { display: flex; align-items: center; gap: 12px; background: var(--gold-light); border: 1px solid #e8d8a8; border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; }
  .winner-star { font-size: 20px; color: var(--gold); }
  .winner-name { font-size: 18px; font-weight: 600; flex: 1; }
  .winner-pts { font-size: 22px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--gold); }
  .reset-link { background: none; border: none; color: var(--text3); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; padding: 4px 0; text-decoration: underline; text-underline-offset: 3px; }
  .final-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--green); margin-top: 2px; display: block; }
</style>
</head>
<body>
<div class="header">
  <h1>Trivia Scorekeeper</h1>
  <div class="game-status">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">No game active</span>
  </div>
</div>
<nav class="nav" style="grid-template-columns:repeat(3,1fr);">
  <button class="nav-btn active" id="nav-home" onclick="goTo('home',this)">Home</button>
  <button class="nav-btn" id="nav-scores" onclick="goTo('scores',this)">Scores</button>
  <button class="nav-btn" id="nav-board" onclick="goTo('board',this)">Board</button>
</nav>
<div id="screen-home" class="screen active">
  <div id="home-content"></div>
  <div style="padding-top:0.5rem;">
    <hr class="divider" style="margin-top:0;" />
    <button onclick="toggleSheets()" style="background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;padding:0;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;width:100%;">
      <span id="sheets-arrow" style="font-size:10px;transition:transform 0.2s;">&#9658;</span>
      Google Sheets logging
      <span id="sheets-status-dot" style="width:7px;height:7px;border-radius:50%;background:var(--border2);margin-left:4px;display:inline-block;"></span>
    </button>
    <div id="sheets-panel" style="display:none;margin-top:12px;">
      <p class="hint">Paste your Apps Script URL to log scores after each round and at end of game.</p>
      <div class="row">
        <input type="text" id="sheets-url" placeholder="https://script.google.com/macros/s/..." style="flex:1;font-size:14px;" />
        <button class="btn btn-sm" onclick="saveSheetUrl()">Save</button>
      </div>
      <p class="saved-flash mt" id="url-flash">URL saved</p>
      <p class="warn" id="url-warn"></p>
      <p class="sheets-status off" id="sheets-status"></p>
    </div>
  </div>
</div>
<div id="screen-scores" class="screen"><div id="scores-content"></div></div>
<div id="screen-board" class="screen">
  <div class="row mb">
    <h2 style="margin:0;">Leaderboard</h2>
    <span class="spacer"></span>
    <span style="font-size:13px;color:var(--text3);font-weight:500;" id="lb-meta"></span>
  </div>
  <div class="lb-card" id="leaderboard"></div>
  <p class="section-label" style="margin-top:1.5rem;">Scores by round</p>
  <div class="table-wrap"><table id="round-table"></table></div>
</div>
<div id="screen-log" class="screen">
  <h2>Score log</h2>
  <div id="log-content"></div>
  <div class="row mt">
    <button class="btn btn-sm" onclick="exportCSV()">Export CSV</button>
    <span class="spacer"></span>
    <span style="font-size:13px;color:var(--text3);" id="log-meta"></span>
  </div>
  <hr class="divider" />
  <p class="section-label">Past sessions</p>
  <div id="past-sessions"></div>
</div>
<script>
var KEY = 'trivia_v2';
var S = loadState();
function loadState() {
  try { var r = localStorage.getItem(KEY); if (r) return JSON.parse(r); } catch(e) {}
  return { teams:[], rounds:{}, currentRound:1, started:false, gameName:'', sessions:[], sheetUrl:'', totalRounds:0 };
}
function saveState() { try { localStorage.setItem(KEY, JSON.stringify(S)); } catch(e) {} }
function flashEl(id) {
  var el = document.getElementById(id); if (!el) return;
  el.classList.add('show'); setTimeout(function() { el.classList.remove('show'); }, 2000);
}
function updateStatus() {
  var rounds = Object.keys(S.rounds).length;
  document.getElementById('status-dot').className = 'status-dot' + (S.started ? ' active' : '');
  document.getElementById('status-text').textContent = S.started
    ? S.gameName + ' - ' + rounds + ' round' + (rounds !== 1 ? 's' : '') + ' played'
    : 'No game active';
}
function goTo(screen, btn) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('screen-' + screen).classList.add('active');
  if (btn) btn.classList.add('active');
  if (screen === 'home') renderHome();
  if (screen === 'scores') renderScores();
  if (screen === 'board') renderBoard();
  if (screen === 'log') renderLog();
}
function toggleSheets() {
  var panel = document.getElementById('sheets-panel');
  var arrow = document.getElementById('sheets-arrow');
  var open = panel.style.display === 'none';
  panel.style.display = open ? 'block' : 'none';
  arrow.style.transform = open ? 'rotate(90deg)' : 'rotate(0deg)';
}
function saveSheetUrl() {
  var val = document.getElementById('sheets-url').value.trim();
  if (val && val.indexOf('https://script.google.com') !== 0) {
    document.getElementById('url-warn').textContent = 'URL should start with https://script.google.com'; return;
  }
  document.getElementById('url-warn').textContent = '';
  S.sheetUrl = val; saveState(); flashEl('url-flash'); updateSheetsStatus();
}
function updateSheetsStatus() {
  var el = document.getElementById('sheets-status');
  var dot = document.getElementById('sheets-status-dot');
  var urlEl = document.getElementById('sheets-url');
  if (urlEl) urlEl.value = S.sheetUrl || '';
  if (el) { el.textContent = S.sheetUrl ? 'Logging enabled' : 'No URL saved'; el.className = 'sheets-status ' + (S.sheetUrl ? 'on' : 'off'); }
  if (dot) dot.style.background = S.sheetUrl ? 'var(--green)' : 'var(--border2)';
}
function logRoundToSheet(roundNum) {
  if (!S.sheetUrl) return;
  var date = new Date().toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric'});
  var scores = S.teams.map(function(t) { return { team: t, points: S.rounds[roundNum][t] || 0 }; });
  fetch(S.sheetUrl, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ type:'round', date:date, gameName:S.gameName, round:roundNum, scores:scores }) })
    .catch(function(e) { console.warn('Sheet log failed:', e); });
}
function logSummaryToSheet() {
  if (!S.sheetUrl) return;
  var date = new Date().toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric'});
  var totals = getTotals();
  var sorted = S.teams.slice().sort(function(a,b) { return totals[b]-totals[a]; });
  var rank = 1;
  var results = sorted.map(function(t, i) {
    if (i > 0 && totals[t] < totals[sorted[i-1]]) rank = i+1;
    return { rank:rank, team:t, total:totals[t] };
  });
  fetch(S.sheetUrl, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ type:'summary', date:date, gameName:S.gameName, roundsPlayed:Object.keys(S.rounds).length, results:results }) })
    .catch(function(e) { console.warn('Sheet summary failed:', e); });
}
function getTotals() {
  var totals = {};
  S.teams.forEach(function(t) { totals[t] = 0; });
  Object.values(S.rounds).forEach(function(rd) {
    Object.entries(rd).forEach(function(e) { if (totals[e[0]] !== undefined) totals[e[0]] += e[1]; });
  });
  return totals;
}
function el(tag, cls, text) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
}
function makeAction(title, sub, isEnd, onclick) {
  var div = el('div', 'home-action ' + (isEnd ? 'end-game' : 'primary'));
  div.onclick = onclick;
  var icon = el('div', 'home-action-icon', isEnd ? '' : '>');
  if (isEnd) icon.innerHTML = '&#10003;';
  var td = el('div', 'home-action-text');
  td.appendChild(el('div', 'home-action-title', title));
  td.appendChild(el('div', 'home-action-sub', sub));
  div.appendChild(icon); div.appendChild(td); div.appendChild(el('div', 'home-action-arrow', '>'));
  return div;
}
function renderHome() {
  updateSheetsStatus();
  var root = document.getElementById('home-content');
  var rounds = Object.keys(S.rounds).length;
  var isComplete = S.totalRounds > 0 && rounds >= S.totalRounds;
  var isFinalRound = S.totalRounds > 0 && S.currentRound === S.totalRounds;
  root.innerHTML = '';
  if (!S.started) { renderHomeSetup(root); } else { renderHomeGame(root, rounds, isComplete, isFinalRound); }
}
function renderHomeSetup(root) {
  root.appendChild(el('p', 'home-label', 'New game'));
  var teamDiv = el('div'); teamDiv.style.marginBottom = '8px';
  S.teams.forEach(function(t, i) {
    var row = el('div', 'team-item');
    row.appendChild(el('span', 'team-pill', t));
    var btn = el('button', 'btn btn-icon', 'x');
    btn.style.cssText = 'color:var(--red);border-color:var(--border);box-shadow:none;flex-shrink:0;';
    btn.onclick = (function(idx) { return function() { S.teams.splice(idx,1); saveState(); renderHome(); }; })(i);
    row.appendChild(btn); teamDiv.appendChild(row);
  });
  root.appendChild(teamDiv);
  var addRow = el('div'); addRow.style.cssText = 'display:flex;gap:8px;margin-bottom:8px;';
  var inp = el('input'); inp.type='text'; inp.id='home-team-input'; inp.placeholder='Add a team...'; inp.style.flex='1';
  inp.onkeydown = function(e) { if (e.key === 'Enter') addTeamHome(); };
  var addBtn = el('button', 'btn btn-sm', 'Add'); addBtn.onclick = addTeamHome;
  addRow.appendChild(inp); addRow.appendChild(addBtn); root.appendChild(addRow);
  var rRow = el('div'); rRow.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px;';
  var rInp = el('input'); rInp.type='number'; rInp.id='home-rounds-input'; rInp.min='1'; rInp.max='30'; rInp.value='4';
  rInp.style.cssText = 'width:60px;font-size:15px;text-align:center;';
  rRow.appendChild(rInp); rRow.appendChild(el('label', null, 'rounds')); root.appendChild(rRow);
  var warn = el('p', 'warn'); warn.id = 'home-warn'; warn.style.marginBottom = '8px'; root.appendChild(warn);
  var startBtn = el('button', 'btn btn-primary', 'Start game');
  startBtn.style.cssText = 'width:100%;padding:15px;font-size:16px;';
  startBtn.onclick = startGameHome; root.appendChild(startBtn);
}
function renderHomeGame(root, rounds, isComplete, isFinalRound) {
  var totals = getTotals();
  var sorted = S.teams.slice().sort(function(a,b) { return totals[b]-totals[a]; });
  var hdr = el('div'); hdr.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;';
  var lbl = el('p', 'home-label', S.gameName); lbl.style.margin = '0';
  var plbl = el('span', null, rounds + ' of ' + S.totalRounds + ' rounds');
  plbl.style.cssText = 'font-size:12px;color:var(--text3);font-weight:500;';
  hdr.appendChild(lbl); hdr.appendChild(plbl); root.appendChild(hdr);
  var barWrap = el('div', 'progress-bar-wrap');
  var barFill = el('div', 'progress-bar-fill');
  barFill.style.width = (S.totalRounds > 0 ? Math.min(100, Math.round(rounds/S.totalRounds*100)) : 0) + '%';
  barWrap.appendChild(barFill); root.appendChild(barWrap);
  var sr = el('div', 'stat-row');
  sr.appendChild(makeStatCard(String(S.teams.length), 'Teams'));
  sr.appendChild(makeStatCard(rounds + ' / ' + S.totalRounds, 'Rounds played'));
  root.appendChild(sr);
  if (!isComplete) {
    root.appendChild(makeAction(
      isFinalRound ? 'Enter final round scores' : 'Enter round ' + S.currentRound + ' scores',
      isFinalRound ? 'Last round - then announce the winner' : rounds + ' of ' + S.totalRounds + ' rounds complete',
      false, function() { goTo('scores', document.getElementById('nav-scores')); }
    ));
  } else {
    root.appendChild(makeAction('End game & announce winner', 'All ' + S.totalRounds + ' rounds complete', true, showEndGame));
  }
  var sec = el('div'); sec.style.display = isComplete ? 'none' : 'block';
  sec.appendChild(el('hr', 'divider'));
  var tlbl = el('p', 'section-label', 'Teams'); tlbl.style.marginBottom = '10px'; sec.appendChild(tlbl);
  var tc = el('div', 'card'); tc.style.cssText = 'padding:0 1rem;margin-bottom:0;';
  sorted.forEach(function(t) {
    var row = el('div', 'log-entry'); row.appendChild(el('span', null, t)); tc.appendChild(row);
  });
  var arow = el('div', 'row'); arow.style.padding = '10px 0';
  var ai = el('input'); ai.type='text'; ai.id='home-add-input'; ai.placeholder='Add a team...'; ai.style.cssText='flex:1;font-size:14px;';
  ai.onkeydown = function(e) { if (e.key === 'Enter') addTeamMidGame(); };
  var ab = el('button', 'btn btn-sm', 'Add'); ab.onclick = addTeamMidGame;
  arow.appendChild(ai); arow.appendChild(ab); tc.appendChild(arow); sec.appendChild(tc);
  var aw = el('p', 'warn'); aw.id = 'home-warn'; sec.appendChild(aw);
  var llbl = el('p', 'section-label', 'Score log'); llbl.style.cssText = 'margin-top:1rem;margin-bottom:10px;'; sec.appendChild(llbl);
  var lc = el('div', 'card'); lc.id = 'home-log-preview'; lc.style.cssText = 'padding:0 1rem;margin-bottom:0;'; sec.appendChild(lc);
  var lb = el('button', 'btn btn-sm', 'View full log & export'); lb.style.cssText = 'margin-top:8px;width:100%;';
  lb.onclick = function() { goTo('log', null); }; sec.appendChild(lb);
  root.appendChild(sec);
  var rw = el('div'); rw.style.cssText = 'margin-top:1.25rem;text-align:center;';
  var rb = el('button', 'reset-link', 'Reset game'); rb.onclick = resetAll; rw.appendChild(rb); root.appendChild(rw);
  renderHomeLogPreview();
}
function makeStatCard(val, label) {
  var c = el('div', 'stat-card');
  c.appendChild(el('div', 'stat-val', val));
  c.appendChild(el('div', 'stat-label', label));
  return c;
}
function renderHomeLogPreview() {
  var logEl = document.getElementById('home-log-preview'); if (!logEl) return;
  var nums = Object.keys(S.rounds).map(Number).sort(function(a,b) { return b-a; }).slice(0,2);
  if (nums.length === 0) { logEl.innerHTML = '<p class="muted" style="padding:10px 0;font-size:13px;">No rounds saved yet.</p>'; return; }
  logEl.innerHTML = '';
  nums.forEach(function(r) {
    var lbl = el('p', 'section-label', 'Round ' + r); lbl.style.paddingTop = '10px'; logEl.appendChild(lbl);
    Object.entries(S.rounds[r]).sort(function(a,b) { return b[1]-a[1]; }).forEach(function(e) {
      var row = el('div', 'log-entry');
      row.appendChild(el('span', null, e[0])); row.appendChild(el('span', 'log-pts', e[1]));
      logEl.appendChild(row);
    });
  });
}
function addTeamHome() {
  var input = document.getElementById('home-team-input'); var name = input ? input.value.trim() : '';
  if (!name) return;
  if (S.teams.map(function(t){return t.toLowerCase();}).indexOf(name.toLowerCase()) >= 0) {
    var w = document.getElementById('home-warn'); if (w) w.textContent = 'Name already taken.'; return;
  }
  S.teams.push(name); if (input) input.value = '';
  var w = document.getElementById('home-warn'); if (w) w.textContent = '';
  saveState(); renderHome();
  setTimeout(function() { var i = document.getElementById('home-team-input'); if (i) i.focus(); }, 50);
}
function startGameHome() {
  if (S.teams.length < 2) { var w = document.getElementById('home-warn'); if (w) w.textContent = 'Add at least 2 teams first.'; return; }
  var rEl = document.getElementById('home-rounds-input'); var rounds = rEl ? parseInt(rEl.value) : 0;
  if (!rounds || rounds < 1 || rounds > 30) { var w = document.getElementById('home-warn'); if (w) w.textContent = 'Enter rounds (1-30).'; return; }
  S.started = true; S.totalRounds = rounds;
  S.gameName = new Date().toLocaleDateString('en-US', {month:'short', day:'numeric'});
  saveState(); updateStatus(); goTo('scores', document.getElementById('nav-scores'));
}
function addTeamMidGame() {
  var input = document.getElementById('home-add-input'); var name = input ? input.value.trim() : '';
  if (!name) return;
  if (S.teams.map(function(t){return t.toLowerCase();}).indexOf(name.toLowerCase()) >= 0) {
    var w = document.getElementById('home-warn'); if (w) w.textContent = 'Name already taken.'; return;
  }
  S.teams.push(name); if (input) input.value = '';
  saveState(); updateStatus(); renderHome();
}
function resetAll() {
  if (!confirm('Reset this game? Scores will not be saved.')) return;
  S.teams=[]; S.rounds={}; S.currentRound=1; S.started=false; S.gameName=''; S.totalRounds=0;
  saveState(); updateStatus(); goTo('home', document.getElementById('nav-home'));
}
function showEndGame() {
  var totals = getTotals();
  var sorted = S.teams.slice().sort(function(a,b) { return totals[b]-totals[a]; });
  var topScore = totals[sorted[0]];
  var winners = sorted.filter(function(t) { return totals[t] === topScore; });
  var overlay = el('div', 'modal-overlay'); overlay.id = 'end-modal';
  var modal = el('div', 'modal');
  modal.appendChild(el('p', 'modal-title', winners.length > 1 ? "It's a tie!" : 'Game over'));
  modal.appendChild(el('p', 'modal-sub', S.gameName + ' - ' + S.totalRounds + ' rounds - ' + S.teams.length + ' teams'));
  winners.forEach(function(w) {
    var row = el('div', 'winner-row');
    row.appendChild(el('span', 'winner-star', '*'));
    row.appendChild(el('span', 'winner-name', w));
    row.appendChild(el('span', 'winner-pts', String(totals[w])));
    modal.appendChild(row);
  });
  var others = sorted.slice(winners.length);
  if (others.length > 0) {
    var oc = el('div', 'card'); oc.style.cssText = 'padding:0 1rem;margin-top:10px;';
    others.forEach(function(t, i) {
      var row = el('div', 'log-entry');
      row.appendChild(el('span', null, (winners.length+i+1) + '. ' + t));
      row.appendChild(el('span', 'log-pts', String(totals[t])));
      oc.appendChild(row);
    });
    modal.appendChild(oc);
  }
  var sb = el('button', 'btn btn-primary', 'Save & start new game');
  sb.style.cssText = 'width:100%;padding:15px;font-size:16px;margin-top:1.25rem;';
  sb.onclick = confirmEndGame; modal.appendChild(sb);
  var bb = el('button', 'btn', 'Back to game'); bb.style.cssText = 'width:100%;padding:12px;margin-top:8px;';
  bb.onclick = function() { var m = document.getElementById('end-modal'); if (m) m.remove(); };
  modal.appendChild(bb); overlay.appendChild(modal); document.body.appendChild(overlay);
}
function confirmEndGame() {
  logSummaryToSheet();
  S.sessions = S.sessions || [];
  S.sessions.push({ name:S.gameName, date:new Date().toISOString(), teams:S.teams.slice(), rounds:JSON.parse(JSON.stringify(S.rounds)) });
  S.teams=[]; S.rounds={}; S.currentRound=1; S.started=false; S.gameName=''; S.totalRounds=0;
  saveState(); var m = document.getElementById('end-modal'); if (m) m.remove();
  goTo('home', document.getElementById('nav-home')); updateStatus();
}
function renderScores() {
  var wrap = document.getElementById('scores-content'); wrap.innerHTML = '';
  if (!S.teams.length) { wrap.appendChild(makeAction('Add teams first', 'Go to Home to add teams', false, function() { goTo('home', document.getElementById('nav-home')); })); return; }
  if (!S.started) { wrap.appendChild(makeAction('Start the game first', 'Go to Home and tap Start game', false, function() { goTo('home', document.getElementById('nav-home')); })); return; }
  var r = S.currentRound; var existing = S.rounds[r] || {};
  var isEdit = Object.keys(existing).length > 0;
  var isFinal = S.totalRounds > 0 && r === S.totalRounds;
  var isComplete = S.totalRounds > 0 && Object.keys(S.rounds).length >= S.totalRounds;
  var hdr = el('div', 'row mb');
  var tw = el('div'); var h2 = el('h2', null, 'Round ' + r); h2.style.margin = '0'; tw.appendChild(h2);
  if (isFinal) { var fl = el('span', 'final-label', 'Final round'); tw.appendChild(fl); }
  var pb = el('button', 'btn btn-icon btn-ghost', '<'); pb.disabled = r <= 1; pb.onclick = function() { changeRound(-1); };
  var nb = el('button', 'btn btn-icon btn-ghost', '>'); nb.onclick = function() { changeRound(1); };
  hdr.appendChild(tw); hdr.appendChild(el('span', 'spacer')); hdr.appendChild(pb); hdr.appendChild(nb);
  wrap.appendChild(hdr);
  if (isEdit) { wrap.appendChild(el('p', 'hint', 'Editing round ' + r + ' - save to update the leaderboard.')); }
  S.teams.forEach(function(t) {
    var val = existing[t] !== undefined ? existing[t] : '';
    var card = el('div', 'score-card');
    card.appendChild(el('span', 'team-name', t));
    var inp = el('input'); inp.type='number'; inp.id='sc_'+t.replace(/[^a-z0-9]/gi,'_');
    inp.value=val; inp.min='0'; inp.placeholder='0'; inp.setAttribute('inputmode','numeric');
    card.appendChild(inp); wrap.appendChild(card);
  });
  var sb = el('button', 'btn btn-primary mt', isFinal ? 'Save final round' : 'Save round');
  sb.style.cssText = 'width:100%;padding:15px;font-size:16px;'; sb.onclick = saveRound; wrap.appendChild(sb);
  var we = el('p', 'warn'); we.id = 'score-warn'; wrap.appendChild(we);
  var sf = el('p', 'saved-flash mt', 'Round saved'); sf.id = 'score-flash'; wrap.appendChild(sf);
  if (isComplete && r === S.totalRounds) {
    var ed = el('div'); ed.style.marginTop = '1rem';
    ed.appendChild(makeAction('End game & announce winner', 'All ' + S.totalRounds + ' rounds complete', true, showEndGame));
    wrap.appendChild(ed);
  }
}
function changeRound(dir) {
  if (dir === -1 && S.currentRound <= 1) return;
  S.currentRound += dir; saveState(); renderScores();
}
function saveRound() {
  var r = S.currentRound; if (!S.rounds[r]) S.rounds[r] = {};
  var allFilled = true;
  S.teams.forEach(function(t) {
    var e = document.getElementById('sc_'+t.replace(/[^a-z0-9]/gi,'_'));
    if (!e || e.value.trim() === '') { allFilled = false; return; }
    S.rounds[r][t] = parseFloat(e.value) || 0;
  });
  var we = document.getElementById('score-warn');
  if (!allFilled) { if (we) we.textContent = 'Fill in all scores before saving.'; return; }
  if (we) we.textContent = '';
  saveState(); flashEl('score-flash'); logRoundToSheet(r);
  var justFinished = S.totalRounds > 0 && r >= S.totalRounds;
  if (!justFinished) { S.currentRound = Math.max.apply(null, Object.keys(S.rounds).map(Number)) + 1; saveState(); }
  renderScores(); updateStatus();
  if (justFinished) { setTimeout(showEndGame, 600); }
}
function renderBoard() {
  var totals = getTotals();
  var roundNums = Object.keys(S.rounds).map(Number).sort(function(a,b){return a-b;});
  var rounds = roundNums.length;
  document.getElementById('lb-meta').textContent = rounds + ' round' + (rounds!==1?'s':'');
  var sorted = S.teams.slice().sort(function(a,b){return totals[b]-totals[a];});
  var lb = document.getElementById('leaderboard'); lb.innerHTML = '';
  if (!sorted.length) { lb.innerHTML = '<p class="muted" style="padding:1rem;">No teams yet.</p>'; }
  else {
    var rank = 1;
    sorted.forEach(function(t,i) {
      if (i>0 && totals[t]<totals[sorted[i-1]]) rank=i+1;
      var tied = sorted.filter(function(x){return totals[x]===totals[t];}).length>1;
      var cls = rank===1?'rb-1':rank===2?'rb-2':rank===3?'rb-3':'rb-n';
      var item = el('div','lb-item'+(rank===1?' rank-first':''));
      var badge = el('div','rank-badge '+cls,String(rank));
      var name = el('div','lb-name',t);
      if (tied) { var tag=el('span','tie-tag','TIE'); name.appendChild(tag); }
      item.appendChild(badge); item.appendChild(name); item.appendChild(el('div','lb-pts',String(totals[t])));
      lb.appendChild(item);
    });
  }
  var tbl = document.getElementById('round-table'); tbl.innerHTML='';
  if (!rounds||!sorted.length) { tbl.innerHTML='<tr><td style="padding:1rem;color:var(--text3);">No rounds yet.</td></tr>'; return; }
  var hdr='<tr><th>Team</th>';
  roundNums.forEach(function(r){hdr+='<th>R'+r+'</th>';});
  hdr+='<th style="color:var(--accent);">Total</th></tr>';
  tbl.innerHTML=hdr;
  sorted.forEach(function(t){
    var row='<tr><td>'+t+'</td>';
    roundNums.forEach(function(r){row+='<td>'+(S.rounds[r]&&S.rounds[r][t]!==undefined?S.rounds[r][t]:'-')+'</td>';});
    row+='<td class="total-col">'+totals[t]+'</td></tr>';
    tbl.innerHTML+=row;
  });
}
function renderLog() {
  var nums = Object.keys(S.rounds).map(Number).sort(function(a,b){return a-b;});
  var log = document.getElementById('log-content'); log.innerHTML='';
  if (!nums.length) { log.innerHTML='<p class="muted">No rounds saved yet.</p>'; }
  else {
    nums.forEach(function(r) {
      var div = el('div','card'); div.style.marginBottom='10px';
      var lbl = el('p','section-label','Round '+r); lbl.style.marginBottom='8px'; div.appendChild(lbl);
      Object.entries(S.rounds[r]).sort(function(a,b){return b[1]-a[1];}).forEach(function(e) {
        var row=el('div','log-entry');
        row.appendChild(el('span',null,e[0])); row.appendChild(el('span','log-pts',e[1]));
        div.appendChild(row);
      });
      log.appendChild(div);
    });
  }
  document.getElementById('log-meta').textContent = S.gameName||'';
  var past=document.getElementById('past-sessions'); past.innerHTML='';
  var sessions=(S.sessions||[]).slice().reverse();
  if (!sessions.length) { past.innerHTML='<p class="muted">No archived sessions yet.</p>'; return; }
  sessions.forEach(function(sess) {
    var d=new Date(sess.date); var st={};
    sess.teams.forEach(function(t){st[t]=0;});
    Object.values(sess.rounds).forEach(function(rd){Object.entries(rd).forEach(function(e){if(st[e[0]]!==undefined)st[e[0]]+=e[1];});});
    var ss=sess.teams.slice().sort(function(a,b){return st[b]-st[a];});
    var card=el('div','card');
    var lbl=el('p','section-label',sess.name+' - '+d.toLocaleDateString()); lbl.style.marginBottom='8px'; card.appendChild(lbl);
    ss.forEach(function(t,i){
      var row=el('div','log-entry');
      row.appendChild(el('span',null,(i+1)+'. '+t)); row.appendChild(el('span','log-pts',String(st[t])));
      card.appendChild(row);
    });
    past.appendChild(card);
  });
}
function exportCSV() {
  var nums=Object.keys(S.rounds).map(Number).sort(function(a,b){return a-b;});
  var totals=getTotals();
  var rows=['Team,'+nums.map(function(r){return 'Round '+r;}).join(',')+',Total'];
  S.teams.forEach(function(t){
    rows.push([t].concat(nums.map(function(r){return S.rounds[r][t]!==undefined?S.rounds[r][t]:'';}).concat([totals[t]])).join(','));
  });
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(rows.join('\n'));
  a.download=(S.gameName||'trivia')+'_scores.csv'; a.click();
}
renderHome(); updateStatus();
</script>
</body>
