<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Trivia Score" />
<title>Trivia Scorekeeper</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #eef1f4;
    --white: #f8fafb;
    --border: #d6dde4;
    --border2: #b8c5cf;
    --text: #162030;
    --text2: #4a5a6a;
    --text3: #8a9aaa;
    --accent: #2a5478;
    --accent-light: #dde8f0;
    --accent-text: #1e3d58;
    --gold: #b07d2a;
    --gold-light: #f5edda;
    --green: #2a7a52;
    --green-light: #e0f2ea;
    --red: #b03030;
    --red-light: #faeaea;
    --silver: #6e9ab5;
    --bronze: #7a5c2a;
    --radius: 14px;
    --radius-sm: 10px;
    --shadow: 0 1px 3px rgba(22,32,48,0.07), 0 1px 2px rgba(22,32,48,0.05);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { background: #dce2e8; min-height: 100vh; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; max-width: 480px; margin: 0 auto; min-height: 100vh; border-left: 1px solid var(--border); border-right: 1px solid var(--border); box-shadow: 0 0 0 1px var(--border), 0 4px 32px rgba(22,32,48,0.10); }

  /* Header */
  .header { background: var(--white); padding: 1rem 1.25rem 0.875rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 18px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
  .header .game-status { font-size: 12px; color: var(--text3); margin-top: 3px; display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
  .status-dot.active { background: var(--green); }

  /* Nav */
  .nav { background: var(--white); display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid var(--border); }
  .nav-btn { padding: 0.7rem 0; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; background: none; border: none; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; letter-spacing: 0; }
  .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Screens */
  .screen { display: none; padding: 1.25rem; padding-bottom: 6rem; }
  .screen.active { display: block; }

  /* Typography */
  h2 { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 1.25rem; color: var(--text); }
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 0.625rem; }

  /* Inputs */
  input[type="text"], input[type="number"] {
    background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); font-size: 16px; padding: 12px 14px; width: 100%;
    font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.15s;
    box-shadow: var(--shadow);
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(42,84,120,0.12); }
  input[type="number"] { text-align: center; font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; }
  input::placeholder { color: var(--text3); }

  /* Buttons */
  .btn { cursor: pointer; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--white); color: var(--text); font-size: 15px; font-weight: 500; padding: 11px 18px; font-family: 'DM Sans', sans-serif; transition: all 0.15s; box-shadow: var(--shadow); }
  .btn:active { transform: scale(0.98); opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 8px rgba(42,84,120,0.25); }
  .btn-primary:active { background: var(--accent-text); }
  .btn-sm { padding: 8px 14px; font-size: 14px; }
  .btn-ghost { background: none; border-color: transparent; color: var(--text2); box-shadow: none; }
  .btn-danger { border-color: var(--red); color: var(--red); background: var(--red-light); box-shadow: none; }
  .btn-icon { width: 40px; height: 40px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; border-radius: var(--radius-sm); }

  /* Cards */
  .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.125rem; margin-bottom: 10px; box-shadow: var(--shadow); }

  /* Team list */
  .team-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .team-pill { flex: 1; font-size: 15px; font-weight: 500; padding: 12px 14px; background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); box-shadow: var(--shadow); }

  /* Score entry */
  .score-card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow); }
  .score-card .team-name { flex: 1; font-size: 16px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .score-card input { width: 76px; flex-shrink: 0; }

  /* Leaderboard */
  .lb-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); margin-bottom: 1.25rem; }
  .lb-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .lb-item:last-child { border-bottom: none; }
  .lb-item.rank-first { background: var(--accent-light); }
  .rank-badge { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; font-family: 'DM Mono', monospace; }
  .rb-1 { background: var(--accent); color: #fff; }
  .rb-2 { background: transparent; color: var(--accent); border: 2px solid var(--accent); }
  .rb-3 { background: transparent; color: var(--accent-text); border: 1.5px solid var(--border2); }
  .rb-n { background: transparent; color: var(--text3); border: 1px solid var(--border); }
  .lb-name { flex: 1; font-size: 16px; font-weight: 500; }
  .lb-pts { font-size: 24px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--accent); }
  .tie-tag { font-size: 10px; font-weight: 600; color: var(--accent-text); background: var(--accent-light); border-radius: 6px; padding: 2px 7px; margin-left: 8px; letter-spacing: 0.04em; }

  /* Round table */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { padding: 10px 12px; text-align: center; color: var(--text3); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); white-space: nowrap; background: var(--bg); }
  th:first-child { text-align: left; }
  td { padding: 12px; text-align: center; border-bottom: 1px solid var(--border); color: var(--text2); font-family: 'DM Mono', monospace; font-size: 14px; }
  td:first-child { text-align: left; font-family: 'DM Sans', sans-serif; font-weight: 500; color: var(--text); white-space: nowrap; }
  td.total-col { color: var(--accent); font-weight: 600; }
  tr:last-child td { border-bottom: none; }

  /* Log */
  .log-round { margin-bottom: 1rem; }
  .log-entry { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .log-entry:last-child { border-bottom: none; }
  .log-pts { font-family: 'DM Mono', monospace; font-weight: 500; color: var(--accent); }

  /* Misc */
  .warn { color: var(--red); font-size: 13px; margin-top: 8px; font-weight: 500; }
  .muted { color: var(--text2); font-size: 14px; line-height: 1.5; }
  .row { display: flex; gap: 10px; align-items: center; }
  .spacer { flex: 1; }
  .mt { margin-top: 1rem; }
  .mb { margin-bottom: 1rem; }
  .saved-flash { color: var(--green); font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.3s; }
  .saved-flash.show { opacity: 1; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }
  .sheets-status { font-size: 13px; font-weight: 500; margin-top: 8px; }
  .sheets-status.on { color: var(--green); }
  .sheets-status.off { color: var(--text3); }
  .hint { font-size: 13px; color: var(--text2); margin-bottom: 10px; line-height: 1.5; }

  /* Progress bar */
  .progress-bar-wrap { background: var(--border); border-radius: 99px; height: 6px; margin-bottom: 1.25rem; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 99px; background: var(--accent); transition: width 0.4s ease; }

  /* End game modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(22,32,48,0.5); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
  .modal { background: var(--white); border-radius: var(--radius) var(--radius) 0 0; padding: 1.5rem 1.25rem 2.5rem; width: 100%; max-width: 480px; box-shadow: 0 -4px 24px rgba(22,32,48,0.12); }
  .modal-title { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
  .modal-sub { font-size: 14px; color: var(--text2); margin-bottom: 1.5rem; line-height: 1.5; }
  .winner-row { display: flex; align-items: center; gap: 12px; background: var(--gold-light); border: 1px solid #e8d8a8; border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
  .winner-star { font-size: 22px; color: var(--gold); }
  .winner-name { font-size: 18px; font-weight: 600; flex: 1; }
  .winner-pts { font-size: 22px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--gold); }

  /* Home screen */
  .home-state { padding: 2rem 0 1rem; }
  .home-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); margin-bottom: 1.5rem; }
  .home-action { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.25rem; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; cursor: pointer; box-shadow: var(--shadow); transition: border-color 0.15s; }
  .home-action:active { opacity: 0.8; }
  .home-action.primary { border-color: var(--accent); background: var(--accent-light); }
  .home-action-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--accent-light); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; color: var(--accent); font-weight: 600; }
  .home-action.primary .home-action-icon { background: var(--accent); color: #fff; }
  .home-action-text { flex: 1; }
  .home-action-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .home-action-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .home-action-arrow { color: var(--text3); font-size: 16px; }
  .home-stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .home-stat { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; box-shadow: var(--shadow); }
  .home-stat-val { font-size: 28px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--accent); }
  .home-stat-label { font-size: 12px; color: var(--text3); margin-top: 3px; font-weight: 500; }
  .home-leader { background: var(--gold-light); border: 1px solid #e8d8a8; border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow); }
  .home-leader-crown { font-size: 20px; }
  .home-leader-name { font-size: 16px; font-weight: 600; color: var(--text); flex: 1; }
  .home-leader-pts { font-size: 22px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--gold); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>Trivia Scorekeeper</h1>
  </div>
  <div class="game-status">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">No game active</span>
  </div>
</div>

<nav class="nav" style="grid-template-columns:repeat(3,1fr);">
  <button class="nav-btn active" id="nav-home" onclick="goTo('home',this)">Home</button>
  <button class="nav-btn" id="nav-scores" onclick="goTo('scores',this)">Scores</button>
  <button class="nav-btn" id="nav-board" onclick="goTo('board',this)">Board</button>
</nav>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div id="home-content"></div>
</div>

<!-- SETUP -->
<div id="screen-setup" class="screen">
  <h2>Teams</h2>
  <div id="team-list" class="mb"></div>
  <div class="row mb">
    <input type="text" id="new-name" placeholder="Team name…" onkeydown="if(event.key==='Enter')addTeam()" />
    <button class="btn btn-sm" onclick="addTeam()">Add</button>
  </div>
  <p class="warn" id="setup-warn"></p>

  <button class="btn btn-primary" style="width:100%;padding:15px;font-size:16px;" onclick="startGame()" id="start-btn">Start game</button>

  <div class="row mt" style="justify-content:space-between;align-items:center;">
    <span class="saved-flash" id="setup-flash">Saved</span>
    <button onclick="resetAll()" style="background:none;border:none;color:var(--text3);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;padding:4px 0;text-decoration:underline;text-underline-offset:3px;">Reset game</button>
  </div>

  <hr class="divider" />

  <button onclick="toggleSheets()" style="background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;padding:0;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;">
    <span id="sheets-arrow" style="font-size:11px;transition:transform 0.2s;">▶</span>
    Google Sheets logging
    <span id="sheets-status-dot" style="width:7px;height:7px;border-radius:50%;background:var(--border2);margin-left:2px;"></span>
  </button>
  <div id="sheets-panel" style="display:none;margin-top:12px;">
    <p class="hint">Paste your Apps Script URL to log scores automatically after each round and game.</p>
    <div class="row">
      <input type="text" id="sheets-url" placeholder="https://script.google.com/macros/s/…" style="flex:1;font-size:14px;" />
      <button class="btn btn-sm" onclick="saveSheetUrl()">Save</button>
    </div>
    <p class="saved-flash mt" id="url-flash">URL saved</p>
    <p class="warn" id="url-warn"></p>
    <p class="sheets-status off" id="sheets-status"></p>
  </div>
</div>

<!-- SCORES -->
<div id="screen-scores" class="screen">
  <div id="scores-content"></div>
</div>

<!-- LEADERBOARD -->
<div id="screen-board" class="screen">
  <div class="row mb">
    <h2 style="margin:0;">Leaderboard</h2>
    <span class="spacer"></span>
    <span style="font-size:13px;color:var(--text3);font-weight:500;" id="lb-meta"></span>
  </div>

  <div class="lb-card" id="leaderboard"></div>

  <p class="section-title" style="margin-top:1.5rem;">Scores by round</p>
  <div class="table-wrap">
    <table id="round-table"></table>
  </div>
</div>

<!-- LOG -->
<div id="screen-log" class="screen">
  <h2>Score log</h2>
  <div id="log-content"></div>
  <div class="row mt">
    <button class="btn btn-sm" onclick="exportCSV()">Export CSV</button>
    <span class="spacer"></span>
    <span style="font-size:13px;color:var(--text3);" id="log-meta"></span>
  </div>

  <hr class="divider" />
  <p class="section-title">Past sessions</p>
  <div id="past-sessions"></div>
</div>

<script>
const KEY = 'trivia_v2';
let S = load();

function load() {
  try { const r = localStorage.getItem(KEY); if (r) return JSON.parse(r); } catch(e) {}
  return { teams:[], rounds:{}, currentRound:1, started:false, gameName:'', sessions:[], sheetUrl:'', totalRounds:0, finished:false };
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(S)); } catch(e) {}
}
function flash(id) {
  const el = document.getElementById(id);
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}
function updateStatus() {
  const rounds = Object.keys(S.rounds).length;
  const dot = document.getElementById('status-dot');
  dot.classList.toggle('active', S.started);
  document.getElementById('status-text').textContent = S.started
    ? (S.gameName + ' · ' + rounds + ' round' + (rounds!==1?'s':'') + ' played')
    : 'No game active';
}

function goTo(screen, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');
  if (btn) btn.classList.add('active');
  if (screen==='home') renderHome();
  if (screen==='scores') renderScores();
  if (screen==='board') renderBoard();
  if (screen==='log') renderLog();
  if (screen==='setup') renderSetup();
  // For non-nav screens, don't highlight any nav btn
  if (screen==='log' || screen==='setup') document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
}

/* ---- END GAME ---- */
function showEndGame() {
  const totals = getTotals();
  const sorted = S.teams.slice().sort((a,b) => totals[b]-totals[a]);
  const topScore = totals[sorted[0]];
  const winners = sorted.filter(t => totals[t] === topScore);
  const isTie = winners.length > 1;

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'end-modal';

  const winnerRows = winners.map(w => `
    <div class="winner-row">
      <span class="winner-star">&#9733;</span>
      <span class="winner-name">${w}</span>
      <span class="winner-pts">${totals[w]}</span>
    </div>`).join('');

  const runnerUps = sorted.slice(winners.length, winners.length + 3).map((t,i) => `
    <div class="log-entry"><span>${winners.length+i+1}. ${t}</span><span class="log-pts">${totals[t]}</span></div>`).join('');

  overlay.innerHTML = `<div class="modal">
    <p class="modal-title">${isTie ? 'It\'s a tie!' : 'Game over'}</p>
    <p class="modal-sub">${S.gameName} · ${S.totalRounds} rounds · ${S.teams.length} teams</p>
    ${winnerRows}
    ${runnerUps ? '<div class="card" style="padding:0 1rem;margin-top:10px;">'+runnerUps+'</div>' : ''}
    <button class="btn btn-primary" style="width:100%;padding:15px;font-size:16px;margin-top:1.25rem;" onclick="confirmEndGame()">Save &amp; start new game</button>
    <button class="btn" style="width:100%;padding:12px;margin-top:8px;" onclick="document.getElementById('end-modal').remove()">Back to game</button>
  </div>`;
  document.body.appendChild(overlay);
}
async function confirmEndGame() {
  await logSummaryToSheet();
  S.sessions = S.sessions || [];
  S.sessions.push({ name: S.gameName, date: new Date().toISOString(), teams: S.teams.slice(), rounds: JSON.parse(JSON.stringify(S.rounds)) });
  S.teams=[]; S.rounds={}; S.currentRound=1; S.started=false; S.gameName=''; S.totalRounds=0; S.finished=false;
  save();
  const modal = document.getElementById('end-modal');
  if (modal) modal.remove();
  goTo('home', document.getElementById('nav-home'));
  updateStatus();
}
function renderHome() {
  const el = document.getElementById('home-content');
  const rounds = Object.keys(S.rounds).length;
  const totals = getTotals();
  const sorted = S.teams.slice().sort((a,b) => totals[b]-totals[a]);
  const leader = sorted[0];

  if (!S.started) {
    // Build inline team setup
    let teamListHtml = S.teams.map((t,i) => `
      <div class="team-item">
        <span class="team-pill">${t}</span>
        <button class="btn btn-icon" style="color:var(--red);border-color:var(--border);box-shadow:none;flex-shrink:0;" onclick="removeTeamHome(${i})">×</button>
      </div>`).join('');

    const canStart = S.teams.length >= 2;
    el.innerHTML = `
      <div class="home-state">
        <p class="home-label">New game</p>
        <div id="home-team-list" style="margin-bottom:10px;">${teamListHtml}</div>
        <div class="row mb" id="home-add-row">
          <input type="text" id="home-team-input" placeholder="Add a team…" style="flex:1;" onkeydown="if(event.key==='Enter')addTeamHome()" />
          <button class="btn btn-sm" onclick="addTeamHome()">Add</button>
        </div>
        <p class="warn" id="home-warn"></p>
        <div class="row" style="margin-bottom:10px;align-items:center;gap:12px;">
          <label style="font-size:14px;font-weight:500;color:var(--text2);white-space:nowrap;">How many rounds?</label>
          <input type="number" id="home-rounds-input" min="1" max="30" placeholder="8" style="width:80px;flex-shrink:0;" />
        </div>
        <p class="warn" id="home-warn" style="margin-bottom:8px;"></p>
        <button class="btn btn-primary" style="width:100%;padding:15px;font-size:16px;" onclick="startGameHome()" id="home-start-btn">Start game</button>
      </div>`;
  } else {
    // Game in progress
    let leaderHtml = '';
    if (leader && rounds > 0) {
      leaderHtml = `<div class="home-leader">
        <div class="home-leader-crown">&#9733;</div>
        <div class="home-leader-name">${leader}</div>
        <div class="home-leader-pts">${totals[leader]}</div>
      </div>`;
    }

    // Teams section (add during game)
    let teamListHtml = S.teams.map((t,i) => `
      <div class="log-entry"><span>${t}</span></div>`).join('');

    el.innerHTML = `
      <div class="home-state">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <p class="home-label" style="margin:0;">${S.gameName}</p>
          <span style="font-size:12px;color:var(--text3);font-weight:500;">${rounds}/${S.totalRounds} rounds</span>
        </div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${S.totalRounds>0?Math.min(100,Math.round(rounds/S.totalRounds*100)):0}%;"></div></div>
        <div class="home-stat-row">
          <div class="home-stat">
            <div class="home-stat-val">${S.teams.length}</div>
            <div class="home-stat-label">Teams</div>
          </div>
          <div class="home-stat">
            <div class="home-stat-val">${rounds}<span style="font-size:14px;color:var(--text3);"> / ${S.totalRounds}</span></div>
            <div class="home-stat-label">Rounds played</div>
          </div>
        </div>
        ${leaderHtml}
        <div class="home-action primary" onclick="goTo('scores', document.getElementById('nav-scores'))">
          <div class="home-action-icon">›</div>
          <div class="home-action-text">
            <div class="home-action-title">Enter round ${S.currentRound} scores</div>
            <div class="home-action-sub">Tap to score the next round</div>
          </div>
          <div class="home-action-arrow">›</div>
        </div>
        <div class="home-action" onclick="goTo('board', document.getElementById('nav-board'))">
          <div class="home-action-icon" style="background:var(--accent-light);color:var(--accent);">#</div>
          <div class="home-action-text">
            <div class="home-action-title">Leaderboard</div>
            <div class="home-action-sub">${rounds > 0 ? sorted.map((t,i)=>(i+1)+'. '+t).slice(0,3).join(' · ') : 'No rounds yet'}</div>
          </div>
          <div class="home-action-arrow">›</div>
        </div>

        ${rounds >= S.totalRounds ? `<div class="home-action" style="border-color:var(--green);background:var(--green-light);" onclick="showEndGame()">
          <div class="home-action-icon" style="background:var(--green);color:#fff;">&#10003;</div>
          <div class="home-action-text">
            <div class="home-action-title" style="color:var(--green);">End game &amp; announce winner</div>
            <div class="home-action-sub">All ${S.totalRounds} rounds complete</div>
          </div>
          <div class="home-action-arrow" style="color:var(--green);">›</div>
        </div>` : ''}

        <hr class="divider" />

        <div style="margin-bottom:10px;">
          <p class="section-title" style="margin-bottom:10px;">Teams</p>
          <div class="card" style="padding:0 1rem;">
            ${teamListHtml}
            <div class="row" style="padding:10px 0;">
              <input type="text" id="home-add-input" placeholder="Add a team…" style="flex:1;font-size:14px;" onkeydown="if(event.key==='Enter')addTeamMidGame()" />
              <button class="btn btn-sm" onclick="addTeamMidGame()">Add</button>
            </div>
          </div>
          <p class="warn" id="home-warn"></p>
        </div>

        <div style="margin-bottom:10px;">
          <p class="section-title" style="margin-bottom:10px;">Score log</p>
          <div id="home-log-preview" class="card" style="padding:0 1rem;"></div>
          <button class="btn btn-sm" onclick="goTo('log',null)" style="margin-top:8px;width:100%;">View full log &amp; export</button>
        </div>

        <div style="margin-top:1rem;text-align:center;">
          <button onclick="resetAll()" style="background:none;border:none;color:var(--text3);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;padding:4px 0;text-decoration:underline;text-underline-offset:3px;">Reset game</button>
        </div>
      </div>`;

    // Populate log preview
    const logEl = document.getElementById('home-log-preview');
    if (rounds === 0) {
      logEl.innerHTML = '<p class="muted" style="padding:10px 0;font-size:13px;">No rounds saved yet.</p>';
    } else {
      const nums = Object.keys(S.rounds).map(Number).sort((a,b)=>b-a).slice(0,2);
      logEl.innerHTML = nums.map(r => {
        const entries = Object.entries(S.rounds[r]).sort((a,b)=>b[1]-a[1]);
        return `<p class="section-title" style="padding-top:10px;"">Round ${r}</p>` +
          entries.map(([t,s]) => `<div class="log-entry"><span>${t}</span><span class="log-pts">${s}</span></div>`).join('');
      }).join('') + '<div style="height:4px;"></div>';
    }
  }
}
function addTeamHome() {
  const input = document.getElementById('home-team-input');
  const name = input ? input.value.trim() : '';
  if (!name) return;
  if (S.teams.map(t=>t.toLowerCase()).includes(name.toLowerCase())) {
    document.getElementById('home-warn').textContent = 'That name is already taken.'; return;
  }
  S.teams.push(name); input.value = '';
  document.getElementById('home-warn').textContent = '';
  save(); renderHome();
  setTimeout(()=>{ const i=document.getElementById('home-team-input'); if(i) i.focus(); },50);
}
function removeTeamHome(i) { S.teams.splice(i,1); save(); renderHome(); }
function startGameHome() {
  if (S.teams.length < 2) return;
  const rInput = document.getElementById('home-rounds-input');
  const rounds = rInput ? parseInt(rInput.value) : 0;
  if (!rounds || rounds < 1 || rounds > 30) {
    document.getElementById('home-warn').textContent = 'Enter a number of rounds (1–30).'; return;
  }
  S.started = true;
  S.totalRounds = rounds;
  S.finished = false;
  S.gameName = new Date().toLocaleDateString('en-US', {month:'short', day:'numeric'});
  save(); renderHome(); updateStatus();
}
function addTeamMidGame() {
  const input = document.getElementById('home-add-input');
  const name = input ? input.value.trim() : '';
  if (!name) return;
  if (S.teams.map(t=>t.toLowerCase()).includes(name.toLowerCase())) {
    document.getElementById('home-warn').textContent = 'That name is already taken.'; return;
  }
  S.teams.push(name); input.value = '';
  document.getElementById('home-warn').textContent = '';
  save(); renderHome(); updateStatus();
}

/* ---- SETUP ---- */
function renderSetup() {
  const list = document.getElementById('team-list');
  list.innerHTML = '';
  S.teams.forEach((t, i) => {
    const d = document.createElement('div');
    d.className = 'team-item';
    d.innerHTML = `<span class="team-pill">${t}</span>
      ${!S.started ? `<button class="btn btn-icon" style="color:var(--red);border-color:var(--border);box-shadow:none;" onclick="removeTeam(${i})">×</button>` : ''}`;
    list.appendChild(d);
  });
  const sb = document.getElementById('start-btn');
  if (S.started) { sb.textContent = 'Game in progress'; sb.disabled = true; sb.style.opacity='0.5'; }
  else { sb.textContent = 'Start game'; sb.disabled = false; sb.style.opacity='1'; }
  document.getElementById('new-name').disabled = S.started;
  const urlEl = document.getElementById('sheets-url');
  if (urlEl) urlEl.value = S.sheetUrl || '';
  updateSheetsStatus();
  updateStatus();
}
function addTeam() {
  if (S.started) return;
  const el = document.getElementById('new-name');
  const name = el.value.trim();
  if (!name) return;
  if (S.teams.map(t=>t.toLowerCase()).includes(name.toLowerCase())) {
    document.getElementById('setup-warn').textContent = 'That name is already taken.'; return;
  }
  S.teams.push(name); el.value = '';
  document.getElementById('setup-warn').textContent = '';
  save(); renderSetup(); flash('setup-flash');
}
function removeTeam(i) { S.teams.splice(i,1); save(); renderSetup(); }
function startGame() {
  if (S.teams.length < 2) { document.getElementById('setup-warn').textContent = 'Add at least 2 teams first.'; return; }
  S.started = true;
  S.gameName = new Date().toLocaleDateString('en-US', {month:'short', day:'numeric'});
  save(); renderSetup();
  document.getElementById('setup-warn').textContent = '';
}
function resetAll() {
  if (!confirm('Reset this game? Scores will not be saved.')) return;
  S.teams=[]; S.rounds={}; S.currentRound=1; S.started=false; S.gameName=''; S.totalRounds=0; S.finished=false;
  save(); renderHome(); updateStatus();
}
function saveSheetUrl() {
  const val = document.getElementById('sheets-url').value.trim();
  if (val && !val.startsWith('https://script.google.com')) {
    document.getElementById('url-warn').textContent = 'URL should start with https://script.google.com'; return;
  }
  document.getElementById('url-warn').textContent = '';
  S.sheetUrl = val; save(); flash('url-flash'); updateSheetsStatus();
}
function updateSheetsStatus() {
  const el = document.getElementById('sheets-status');
  if (el) {
    if (S.sheetUrl) { el.textContent = 'Logging enabled'; el.className = 'sheets-status on'; }
    else { el.textContent = 'No URL saved'; el.className = 'sheets-status off'; }
  }
  const dot = document.getElementById('sheets-status-dot');
  if (dot) dot.style.background = S.sheetUrl ? 'var(--green)' : 'var(--border2)';
}
function toggleSheets() {
  const panel = document.getElementById('sheets-panel');
  const arrow = document.getElementById('sheets-arrow');
  const open = panel.style.display === 'none';
  panel.style.display = open ? 'block' : 'none';
  arrow.style.transform = open ? 'rotate(90deg)' : 'rotate(0deg)';
}
async function logRoundToSheet(roundNum) {
  if (!S.sheetUrl) return;
  const date = new Date().toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric'});
  const scores = S.teams.map(t => ({ team: t, points: S.rounds[roundNum][t] || 0 }));
  try {
    await fetch(S.sheetUrl, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ type:'round', date, gameName: S.gameName, round: roundNum, scores }) });
  } catch(e) {}
}
async function logSummaryToSheet() {
  if (!S.sheetUrl) return;
  const date = new Date().toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric'});
  const totals = getTotals();
  const sorted = S.teams.slice().sort((a,b) => totals[b]-totals[a]);
  let rank = 1;
  const results = sorted.map((t,i) => {
    if (i > 0 && totals[t] < totals[sorted[i-1]]) rank = i+1;
    return { rank, team: t, total: totals[t] };
  });
  try {
    await fetch(S.sheetUrl, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ type:'summary', date, gameName: S.gameName, roundsPlayed: Object.keys(S.rounds).length, results }) });
  } catch(e) {}
}

/* ---- SCORES ---- */
function renderScores() {
  const wrap = document.getElementById('scores-content');
  wrap.innerHTML = '';

  if (!S.teams.length) {
    wrap.innerHTML = `<div class="home-state">
      <p class="home-label">No teams yet</p>
      <div class="home-action primary" onclick="goTo('setup', document.querySelectorAll('.nav-btn')[4])">
        <div class="home-action-icon">+</div>
        <div class="home-action-text">
          <div class="home-action-title">Add teams first</div>
          <div class="home-action-sub">Go to Teams to set up before scoring</div>
        </div>
        <div class="home-action-arrow">›</div>
      </div>
    </div>`; return;
  }

  if (!S.started) {
    wrap.innerHTML = `<div class="home-state">
      <p class="home-label">Game not started</p>
      <div class="home-action primary" onclick="goTo('setup', document.querySelectorAll('.nav-btn')[4])">
        <div class="home-action-icon">›</div>
        <div class="home-action-text">
          <div class="home-action-title">Start the game first</div>
          <div class="home-action-sub">Go to Teams and tap Start game</div>
        </div>
        <div class="home-action-arrow">›</div>
      </div>
    </div>`; return;
  }

  const r = S.currentRound;
  const existing = S.rounds[r] || {};
  const isEdit = Object.keys(existing).length > 0;

  const header = document.createElement('div');
  header.className = 'row mb';
  header.innerHTML = `<h2 style="margin:0;">Round ${r}</h2>
    <span class="spacer"></span>
    <button class="btn btn-icon btn-ghost" onclick="changeRound(-1)" id="prev-btn" ${r<=1?'disabled':''}>←</button>
    <button class="btn btn-icon btn-ghost" onclick="changeRound(1)">→</button>`;
  wrap.appendChild(header);

  if (isEdit) {
    const hint = document.createElement('p');
    hint.className = 'hint';
    hint.textContent = 'Editing round ' + r + ' — save to update the leaderboard.';
    wrap.appendChild(hint);
  }

  S.teams.forEach(t => {
    const val = existing[t] !== undefined ? existing[t] : '';
    const div = document.createElement('div');
    div.className = 'score-card';
    const safeId = 'sc_' + t.replace(/[^a-z0-9]/gi,'_');
    div.innerHTML = `<span class="team-name">${t}</span>
      <input type="number" id="${safeId}" value="${val}" min="0" placeholder="0" inputmode="numeric" />`;
    wrap.appendChild(div);
  });

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn btn-primary mt';
  saveBtn.style = 'width:100%;padding:15px;font-size:16px;';
  saveBtn.textContent = 'Save round';
  saveBtn.onclick = saveRound;
  wrap.appendChild(saveBtn);

  const warn = document.createElement('p');
  warn.className = 'warn'; warn.id = 'score-warn';
  wrap.appendChild(warn);

  const flash = document.createElement('p');
  flash.className = 'saved-flash mt'; flash.id = 'score-flash';
  flash.textContent = 'Round saved ✓';
  wrap.appendChild(flash);
}
function changeRound(dir) {
  if (dir===-1 && S.currentRound<=1) return;
  S.currentRound += dir; save(); renderScores();
}
function saveRound() {
  const r = S.currentRound;
  if (!S.rounds[r]) S.rounds[r] = {};
  let allFilled = true;
  S.teams.forEach(t => {
    const el = document.getElementById('sc_' + t.replace(/[^a-z0-9]/gi,'_'));
    if (!el || el.value.trim()==='') { allFilled = false; return; }
    S.rounds[r][t] = parseFloat(el.value) || 0;
  });
  const warnEl = document.getElementById('score-warn');
  if (!allFilled) { if(warnEl) warnEl.textContent = 'Fill in all scores before saving.'; return; }
  if(warnEl) warnEl.textContent = '';
  save(); flash('score-flash'); logRoundToSheet(r);
  S.currentRound = Math.max(...Object.keys(S.rounds).map(Number)) + 1;
  save(); renderScores(); updateStatus();
}

/* ---- LEADERBOARD ---- */
function getTotals() {
  const totals = {};
  S.teams.forEach(t => totals[t] = 0);
  Object.values(S.rounds).forEach(rd => {
    Object.entries(rd).forEach(([t,s]) => { if (totals[t]!==undefined) totals[t] += s; });
  });
  return totals;
}
function renderBoard() {
  const totals = getTotals();
  const roundNums = Object.keys(S.rounds).map(Number).sort((a,b)=>a-b);
  const rounds = roundNums.length;
  document.getElementById('lb-meta').textContent = rounds + ' round' + (rounds!==1?'s':'');
  const sorted = S.teams.slice().sort((a,b) => totals[b]-totals[a]);

  const lb = document.getElementById('leaderboard');
  lb.innerHTML = '';
  if (!sorted.length) { lb.innerHTML = '<p class="muted" style="padding:1rem;">No teams yet.</p>'; }
  else {
    let rank = 1;
    sorted.forEach((t,i) => {
      if (i > 0 && totals[t] < totals[sorted[i-1]]) rank = i+1;
      const tied = sorted.filter(x => totals[x]===totals[t]).length > 1;
      const cls = rank===1?'rb-1':rank===2?'rb-2':rank===3?'rb-3':'rb-n';
      const item = document.createElement('div');
      item.className = 'lb-item' + (rank===1?' rank-first':'');
      item.innerHTML = `<div class="rank-badge ${cls}">${rank}</div>
        <div class="lb-name">${t}${tied?'<span class="tie-tag">TIE</span>':''}</div>
        <div class="lb-pts">${totals[t]}</div>`;
      lb.appendChild(item);
    });
  }

  const tbl = document.getElementById('round-table');
  tbl.innerHTML = '';
  if (!rounds || !sorted.length) {
    tbl.innerHTML = '<tr><td style="padding:1rem;color:var(--text3);font-family:DM Sans,sans-serif;">No rounds yet.</td></tr>'; return;
  }
  let hdr = '<tr><th>Team</th>';
  roundNums.forEach(r => { hdr += `<th>R${r}</th>`; });
  hdr += '<th style="color:var(--accent);">Total</th></tr>';
  tbl.innerHTML = hdr;
  sorted.forEach(t => {
    let row = `<tr><td>${t}</td>`;
    roundNums.forEach(r => {
      const val = S.rounds[r] && S.rounds[r][t] !== undefined ? S.rounds[r][t] : '—';
      row += `<td>${val}</td>`;
    });
    row += `<td class="total-col">${totals[t]}</td></tr>`;
    tbl.innerHTML += row;
  });
}

/* ---- LOG ---- */
function renderLog() {
  const nums = Object.keys(S.rounds).map(Number).sort((a,b)=>a-b);
  const log = document.getElementById('log-content');
  log.innerHTML = '';
  if (!nums.length) { log.innerHTML = '<p class="muted">No rounds saved yet.</p>'; }
  else {
    nums.forEach(r => {
      const div = document.createElement('div');
      div.className = 'card log-round';
      div.innerHTML = `<p class="section-title" style="margin-bottom:8px;">Round ${r}</p>`;
      const sorted = Object.entries(S.rounds[r]).sort((a,b)=>b[1]-a[1]);
      sorted.forEach(([t,s]) => {
        const row = document.createElement('div');
        row.className = 'log-entry';
        row.innerHTML = `<span>${t}</span><span class="log-pts">${s}</span>`;
        div.appendChild(row);
      });
      log.appendChild(div);
    });
  }
  document.getElementById('log-meta').textContent = S.gameName || '';
  const past = document.getElementById('past-sessions');
  past.innerHTML = '';
  const sessions = (S.sessions||[]).slice().reverse();
  if (!sessions.length) { past.innerHTML = '<p class="muted">No archived sessions yet.</p>'; return; }
  sessions.forEach(sess => {
    const d = new Date(sess.date);
    const totals = {};
    sess.teams.forEach(t => totals[t]=0);
    Object.values(sess.rounds).forEach(rd => Object.entries(rd).forEach(([t,s])=>{ if(totals[t]!==undefined) totals[t]+=s; }));
    const sorted = sess.teams.slice().sort((a,b)=>totals[b]-totals[a]);
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<p class="section-title" style="margin-bottom:8px;">${sess.name} — ${d.toLocaleDateString()}</p>`
      + sorted.map((t,i) => `<div class="log-entry"><span>${i+1}. ${t}</span><span class="log-pts">${totals[t]}</span></div>`).join('');
    past.appendChild(card);
  });
}
function exportCSV() {
  const nums = Object.keys(S.rounds).map(Number).sort((a,b)=>a-b);
  const totals = getTotals();
  let csv = 'Team,' + nums.map(r=>'Round '+r).join(',') + ',Total\n';
  S.teams.forEach(t => {
    csv += [t, ...nums.map(r => S.rounds[r][t]!==undefined ? S.rounds[r][t] : ''), totals[t]].join(',') + '\n';
  });
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = (S.gameName||'trivia') + '_scores.csv';
  a.click();
}

renderHome();
</script>
</body>
</html>
